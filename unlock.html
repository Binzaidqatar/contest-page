<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Granted – Islamic Contest</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald:       #0f5132;
      --emerald-light: #1a7a4a;
      --gold:          #c8a84b;
      --gold-light:    #e8c96b;
      --cream:         #f9f5ec;
      --parchment:     #ede8d8;
      --text-dark:     #1a2e1a;
      --text-mid:      #4a5a4a;
      --shadow:        0 20px 60px rgba(15,81,50,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(200,168,75,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(15,81,50,0.10) 0%, transparent 60%),
        url("https://www.transparenttextures.com/patterns/arabesque.png");
      background-repeat: repeat;
      padding: 20px;
      overflow: hidden;
    }

    /* Floating geometric shapes – same as index.html */
    .geo {
      position: fixed;
      opacity: 0.07;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .geo-1 { top: 5%;    left: 5%;   width: 120px; animation-delay: 0s; }
    .geo-2 { top: 10%;   right: 8%;  width: 80px;  animation-delay: 2s; }
    .geo-3 { bottom: 10%;left: 10%;  width: 100px; animation-delay: 4s; }
    .geo-4 { bottom: 5%; right: 5%;  width: 140px; animation-delay: 1s; }

    @keyframes float {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-15px) rotate(5deg); }
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
      border: 1px solid rgba(200,168,75,0.2);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .card-header {
      background: linear-gradient(135deg, var(--emerald) 0%, #1a6b3f 100%);
      padding: 28px 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("https://www.transparenttextures.com/patterns/arabesque.png");
      opacity: 0.08;
    }

    .logo-wrap {
      width: 200px;
      height: 100px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
      50%      { box-shadow: 0 0 0 10px rgba(200,168,75,0); }
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0;
    }
    .logo-fallback { font-size: 36px; line-height: 1; }

    .org-name {
      font-family: 'Amiri', serif;
      font-size: 13px;
      color: var(--gold-light);
      letter-spacing: 0.6px;
      line-height: 1.5;
      position: relative;
    }
    .divider {
      display: flex; align-items: center; gap: 10px; margin: 14px 0 0;
    }
    .divider-line    { flex: 1; height: 1px; background: rgba(200,168,75,0.4); }
    .divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    /* Body */
    .card-body { padding: 36px 32px 32px; text-align: center; }

    /* Animated check badge */
    .badge {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 30px rgba(15,81,50,0.35);
      animation: popIn 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.3); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* SVG checkmark draw animation */
    .badge svg { width: 40px; height: 40px; }
    .check-path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.5s 0.8s ease forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Stars burst */
    .stars {
      font-size: 22px;
      letter-spacing: 4px;
      animation: fadeIn 0.6s 1.1s ease both;
      opacity: 0;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .access-title {
      font-family: 'Amiri', serif;
      font-size: 28px;
      color: var(--emerald);
      margin: 14px 0 8px;
      animation: fadeIn 0.6s 0.9s ease both;
      opacity: 0;
    }
    .access-sub {
      font-size: 14px;
      color: var(--text-mid);
      margin-bottom: 28px;
      line-height: 1.6;
      animation: fadeIn 0.6s 1s ease both;
      opacity: 0;
    }

    /* Button */
    button {
      width: 100%;
      padding: 15px;
      font-size: 15px;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold) 0%, #b8933b 100%);
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(200,168,75,0.4);
      animation: fadeIn 0.6s 1.1s ease both;
      opacity: 0;
    }
    button::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15));
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,168,75,0.55);
    }
    button:active { transform: translateY(0); }

    .card-footer {
      text-align: center;
      padding: 0 32px 24px;
      font-size: 11px;
      color: #bbb;
    }

    @media (max-width: 480px) {
      .card-body { padding: 26px 20px 24px; }
      .card-header { padding: 22px 20px 20px; }
      .access-title { font-size: 24px; }
    }
  </style>
</head>
