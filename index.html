<!DOCTYPE html>

<html>
<head>
  <title>Contest Access</title>

  <style>
    body {
      font-family: Arial;

    .box {

      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h2 {
      color: #0f5132;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 90%;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      font-size: 16px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background-color: #0f5132;

</head>

<body>

```

  </div>

</html>
