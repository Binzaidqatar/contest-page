<html>
<head>

    }

<body>

    function checkCode() {
      var userCode = document.getElementById("code").value;
      var correctCode = "Binzaid"; // 🔁 CHANGE THIS EVERY MONTH

      if (userCode === correctCode) {
        window.location.href = "https://forms.cloud.microsoft/r/50u7mdQuj8";

        alert("Invalid code. Try again.");
      }
    }
  </script>
