<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contest Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    .header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 40px;
    }
    input {
      padding: 10px;
      width: 200px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    #error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="header">
  Sheikh Abdullah bin Zaid Al Mahmoud Islamic Cultural Centre
</div>

<h2>Weekly Islamic Contest</h2>
<p>Enter the participation code to continue</p>

<input type="text" id="code" placeholder="Enter code">
<br>
<button onclick="checkCode()">Submit</button>

<p id="error"></p>

<script>
  // 🔑 Şifreyi buradan değiştir
  const SECRET_CODE = "Hello";

  function checkCode() {
    const input = document.getElementById("code").value;

    if (input === SECRET_CODE) {
      window.location.href = "unlock.html";
    } else {
      document.getElementById("error").innerText = "Invalid code. Please try again.";
    }
  }
</script>

</body>
</html>
